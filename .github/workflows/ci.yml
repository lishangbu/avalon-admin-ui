name: CI

on:
  push:
    branches:
      - main
    paths: &ci_paths
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - '.npmrc'
      - '.env'
      - '.env.*'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - '.prettierrc.json'
      - '.editorconfig'
      - 'index.html'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths: *ci_paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: CI / Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package.json

      - name: Install Dependencies
        run: npm install

      - name: Check Format
        run: npm run format

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Run Tests
        run: npm run test

      - name: Build App
        run: npm run build

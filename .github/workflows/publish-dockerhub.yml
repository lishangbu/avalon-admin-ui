name: Publish DockerHub

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  publish-dockerhub:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_BASE_API_URL: /api
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 提取项目版本
        id: projectVersion
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"

          if [[ -z "$version" ]]; then
            echo "无法从 package.json 中解析版本号"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Docker 登录
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建 Docker 镜像
        run: |
          docker build \
            --file Dockerfile \
            --build-arg VITE_BASE_API_URL=${VITE_BASE_API_URL} \
            --tag docker.io/${{ secrets.DOCKER_USERNAME }}/avalon-admin-ui:latest \
            --tag docker.io/${{ secrets.DOCKER_USERNAME }}/avalon-admin-ui:${{ steps.projectVersion.outputs.version }} \
            .

      - name: 推送 latest 镜像
        run: docker push docker.io/${{ secrets.DOCKER_USERNAME }}/avalon-admin-ui:latest

      - name: 推送版本镜像
        run: docker push docker.io/${{ secrets.DOCKER_USERNAME }}/avalon-admin-ui:${{ steps.projectVersion.outputs.version }}
